<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fairway - Colorado Golf Course Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0f1a0f; --surface: #1a2e1a; --surface2: #253525; --accent: #4ecdc4; --accent2: #2ecc71; --gold: #e6a817; --text: #f0f0f0; --dim: #7a9a7a; --border: #2a4a2a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 70px; }
        .header { padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.2rem; color: var(--accent2); }
        .header .user-info { font-size: 0.75rem; color: var(--dim); }
        .header button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }
        .tabs { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); z-index: 1000; }
        .tabs button { flex: 1; padding: 10px 4px; background: none; border: none; color: var(--dim); font-size: 0.6rem; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .tabs button.active { color: var(--accent2); }
        .tabs button .icon { font-size: 1.1rem; }
        .panel { display: none; }
        .panel.active { display: block; }
        #map { height: 50vh; width: 100%; }
        .course-list { padding: 12px; }
        .course-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
        .course-card:hover { border-color: var(--accent2); }
        .course-name { font-size: 0.95rem; font-weight: 700; color: var(--text); }
        .course-city { font-size: 0.8rem; color: var(--dim); margin-top: 2px; }
        .course-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 0.75rem; color: var(--dim); }
        .course-rating { color: var(--gold); font-weight: 700; }
        .stars { color: var(--gold); }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 20px; }
        .modal.show { display: block; }
        .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; max-width: 500px; margin: 0 auto; }
        .modal-content h2 { color: var(--accent2); font-size: 1.1rem; margin-bottom: 12px; }
        .modal-close { position: absolute; top: 15px; right: 20px; background: none; border: none; color: var(--dim); font-size: 1.5rem; cursor: pointer; }
        .rating-group { margin-bottom: 12px; }
        .rating-label { font-size: 0.8rem; color: var(--dim); margin-bottom: 4px; }
        .rating-stars { display: flex; gap: 4px; }
        .rating-stars button { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--surface2); }
        .rating-stars button.filled { color: var(--gold); }
        .btn { background: var(--accent2); color: #000; border: none; padding: 12px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn:active { transform: scale(0.97); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .list-btns { display: flex; gap: 6px; margin-top: 10px; }
        .list-btns button { flex: 1; padding: 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text); }
        .list-btns button.active { background: var(--accent2); color: #000; border-color: var(--accent2); }
        input, textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 6px; font-size: 0.9rem; width: 100%; margin-bottom: 8px; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent2); }
        .photo-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 12px 0; }
        .photo-gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; cursor: pointer; }
        .photo-upload { display: flex; gap: 8px; align-items: center; margin: 10px 0; }
        .photo-upload label { background: var(--surface2); border: 1px solid var(--border); color: var(--accent2); padding: 8px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .photo-upload input[type="file"] { display: none; }
        .auth-panel { padding: 40px 20px; text-align: center; max-width: 360px; margin: 0 auto; }
        .auth-panel h2 { color: var(--accent2); margin-bottom: 20px; }
        .empty-state { padding: 40px; text-align: center; color: var(--dim); font-size: 0.85rem; }
        .search-bar { padding: 12px; }
        .search-bar input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 20px; font-size: 0.85rem; width: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Fairway</h1>
        <div id="auth-status">
            <button onclick="showAuth()">Sign In</button>
        </div>
    </div>

    <div class="panel active" id="panel-discover">
        <div id="map"></div>
        <div class="search-bar"><input type="text" id="search-courses" placeholder="Search courses..."></div>
        <div class="course-list" id="course-list"></div>
    </div>

    <div class="panel" id="panel-played">
        <div class="search-bar"><h2 style="color:var(--accent2);font-size:1rem;padding:8px 0;">Played</h2></div>
        <div class="course-list" id="played-list"></div>
    </div>

    <div class="panel" id="panel-want">
        <div class="search-bar"><h2 style="color:var(--accent2);font-size:1rem;padding:8px 0;">Want to Play</h2></div>
        <div class="course-list" id="want-list"></div>
    </div>

    <div class="panel" id="panel-favorites">
        <div class="search-bar"><h2 style="color:var(--accent2);font-size:1rem;padding:8px 0;">Favorites</h2></div>
        <div class="course-list" id="fav-list"></div>
    </div>

    <div class="panel" id="panel-profile">
        <div class="auth-panel" id="auth-form"></div>
    </div>

    <div class="tabs">
        <button class="active" data-panel="discover"><span class="icon">🗺️</span>Discover</button>
        <button data-panel="played"><span class="icon">✅</span>Played</button>
        <button data-panel="want"><span class="icon">📋</span>Want</button>
        <button data-panel="favorites"><span class="icon">⭐</span>Favorites</button>
        <button data-panel="profile"><span class="icon">👤</span>Profile</button>
    </div>

    <div class="modal" id="course-modal">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div class="modal-content" id="modal-content"></div>
    </div>

<script>
const SUPABASE_URL = 'https://fokpdeenvnulmbthyjph.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZva3BkZWVudm51bG1idGh5anBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTE2ODUsImV4cCI6MjA5NzY4NzY4NX0.G1YYPlAy3s4dKcgKvdplrsukZOqXiJZgS_ePI8NeBfg';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let courses = [];
let userLists = { played: [], want_to_play: [], favorite: [] };
let userRatings = {};
let currentUser = null;
let map, markers = [];

async function init() {
    // Check auth
    const { data: { session } } = await db.auth.getSession();
    if (session) { currentUser = session.user; updateAuthUI(); }
    db.auth.onAuthStateChange((event, session) => {
        currentUser = session?.user || null;
        updateAuthUI();
        if (currentUser) { loadUserData(); }
    });

    // Load courses
    const { data } = await db.from('golf_courses').select('*').order('name');
    courses = data || [];

    initMap();
    renderCourseList();
    setupTabs();
    setupSearch();
    if (currentUser) loadUserData();
}

function initMap() {
    map = L.map('map').setView([39.7, -105.0], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);

    courses.forEach(c => {
        if (!c.latitude || !c.longitude) return;
        const marker = L.circleMarker([c.latitude, c.longitude], {
            radius: 7, color: '#2ecc71', fillColor: '#2ecc71', fillOpacity: 0.7
        }).addTo(map);
        marker.bindTooltip(c.name);
        marker.on('click', () => openCourseModal(c));
        markers.push({ marker, course: c });
    });

    // Try geolocation
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 10);
        });
    }
}

function renderCourseList(filter = '') {
    const list = document.getElementById('course-list');
    const filtered = filter ? courses.filter(c => c.name.toLowerCase().includes(filter) || c.city?.toLowerCase().includes(filter)) : courses;
    list.innerHTML = filtered.map(c => `
        <div class="course-card" onclick="openCourseModal(courses.find(x=>x.id===${c.id}))">
            <div class="course-name">${c.name}</div>
            <div class="course-city">${c.city || ''}, CO</div>
            <div class="course-meta">
                <span>${c.holes} holes</span>
                <span>Par ${c.par || '?'}</span>
                <span>${c.price_range || ''}</span>
            </div>
        </div>
    `).join('') || '<div class="empty-state">No courses found.</div>';
}

function openCourseModal(course) {
    const modal = document.getElementById('course-modal');
    const content = document.getElementById('modal-content');
    const rating = userRatings[course.id] || {};
    const inPlayed = userLists.played.includes(course.id);
    const inWant = userLists.want_to_play.includes(course.id);
    const inFav = userLists.favorite.includes(course.id);

    content.innerHTML = `
        <h2>${course.name}</h2>
        <p style="color:var(--dim);font-size:0.85rem;">${course.city || ''}, CO - ${course.holes} holes - Par ${course.par || '?'} - ${course.price_range || ''}</p>
        <div class="photo-gallery" id="photo-gallery-${course.id}"><p style="color:var(--dim);font-size:0.75rem;grid-column:1/-1;">Loading photos...</p></div>
        ${currentUser ? `
        <div class="photo-upload">
            <label for="photo-input-${course.id}">📷 Add Photo</label>
            <input type="file" id="photo-input-${course.id}" accept="image/*" onchange="uploadPhoto(${course.id}, this)">
            <input type="text" id="photo-caption-${course.id}" placeholder="Caption (optional)" style="flex:1;margin:0;">
        </div>
        <div class="list-btns">
            <button class="${inPlayed?'active':''}" onclick="toggleList(${course.id},'played')">✅ Played</button>
            <button class="${inWant?'active':''}" onclick="toggleList(${course.id},'want_to_play')">📋 Want</button>
            <button class="${inFav?'active':''}" onclick="toggleList(${course.id},'favorite')">⭐ Fav</button>
        </div>
        <h3 style="color:var(--accent2);font-size:0.85rem;margin-top:16px;">Rate this course</h3>
        ${renderRatingGroup('Course', 'rating_course', rating.rating_course)}
        ${renderRatingGroup('Food', 'rating_food', rating.rating_food)}
        ${renderRatingGroup('Vibes', 'rating_vibes', rating.rating_vibes)}
        ${renderRatingGroup('Price', 'rating_price', rating.rating_price)}
        ${renderRatingGroup('Pace', 'rating_pace', rating.rating_pace)}
        ${renderRatingGroup('Conditions', 'rating_conditions', rating.rating_conditions)}
        ${renderRatingGroup('Difficulty', 'rating_difficulty', rating.rating_difficulty)}
        ${renderRatingGroup('Scenery', 'rating_scenery', rating.rating_scenery)}
        <textarea id="rating-notes" placeholder="Notes (optional)">${rating.notes||''}</textarea>
        <input type="date" id="rating-date" value="${rating.date_played||''}">
        <button class="btn" onclick="saveRating(${course.id})">Save Rating</button>
        ` : '<p style="margin-top:16px;color:var(--dim);font-size:0.85rem;">Sign in to rate, upload photos, and track courses.</p>'}
    `;
    modal.classList.add('show');
    loadPhotos(course.id);
}

function renderRatingGroup(label, field, value) {
    const stars = [1,2,3,4,5].map(i => `<button class="${i<=( value||0)?'filled':''}" onclick="setStars(this,'${field}',${i})">★</button>`).join('');
    return `<div class="rating-group"><div class="rating-label">${label}</div><div class="rating-stars" data-field="${field}">${stars}</div></div>`;
}

window.setStars = function(btn, field, value) {
    const group = btn.parentElement;
    group.querySelectorAll('button').forEach((b, i) => b.classList.toggle('filled', i < value));
    group.dataset.value = value;
};

function closeModal() { document.getElementById('course-modal').classList.remove('show'); }

async function saveRating(courseId) {
    if (!currentUser) return;
    const modal = document.getElementById('modal-content');
    const data = { course_id: courseId, user_id: currentUser.id };
    modal.querySelectorAll('.rating-stars').forEach(g => {
        if (g.dataset.value) data[g.dataset.field] = parseInt(g.dataset.value);
    });
    data.notes = document.getElementById('rating-notes')?.value || null;
    data.date_played = document.getElementById('rating-date')?.value || null;

    await db.from('golf_ratings').upsert(data, { onConflict: 'course_id,user_id' });
    userRatings[courseId] = data;
    closeModal();
}

async function toggleList(courseId, listType) {
    if (!currentUser) return;
    const idx = userLists[listType].indexOf(courseId);
    if (idx >= 0) {
        await db.from('golf_lists').delete().eq('course_id', courseId).eq('user_id', currentUser.id).eq('list_type', listType);
        userLists[listType].splice(idx, 1);
    } else {
        await db.from('golf_lists').insert({ course_id: courseId, user_id: currentUser.id, list_type: listType });
        userLists[listType].push(courseId);
    }
    openCourseModal(courses.find(c => c.id === courseId));
    renderLists();
}

async function loadUserData() {
    if (!currentUser) return;
    const { data: lists } = await db.from('golf_lists').select('*').eq('user_id', currentUser.id);
    userLists = { played: [], want_to_play: [], favorite: [] };
    (lists || []).forEach(l => { if (userLists[l.list_type]) userLists[l.list_type].push(l.course_id); });

    const { data: ratings } = await db.from('golf_ratings').select('*').eq('user_id', currentUser.id);
    userRatings = {};
    (ratings || []).forEach(r => { userRatings[r.course_id] = r; });

    renderLists();
}

function renderLists() {
    ['played', 'want_to_play', 'favorite'].forEach(type => {
        const containerId = type === 'played' ? 'played-list' : type === 'want_to_play' ? 'want-list' : 'fav-list';
        const container = document.getElementById(containerId);
        const listCourses = courses.filter(c => userLists[type].includes(c.id));
        container.innerHTML = listCourses.map(c => `
            <div class="course-card" onclick="openCourseModal(courses.find(x=>x.id===${c.id}))">
                <div class="course-name">${c.name}</div>
                <div class="course-city">${c.city || ''}, CO</div>
                <div class="course-meta"><span>${c.holes} holes</span><span>${c.price_range||''}</span></div>
            </div>
        `).join('') || '<div class="empty-state">Nothing here yet.</div>';
    });
}

function setupTabs() {
    document.querySelectorAll('.tabs button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
            if (btn.dataset.panel === 'discover') setTimeout(() => map.invalidateSize(), 100);
        });
    });
}

function setupSearch() {
    document.getElementById('search-courses').addEventListener('input', e => {
        renderCourseList(e.target.value.toLowerCase());
    });
}

// Auth
function updateAuthUI() {
    const el = document.getElementById('auth-status');
    if (currentUser) {
        el.innerHTML = `<span class="user-info">${currentUser.email}</span> <button onclick="signOut()">Out</button>`;
    } else {
        el.innerHTML = `<button onclick="showAuth()">Sign In</button>`;
    }
    renderProfilePanel();
}

function showAuth() {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelector('[data-panel="profile"]').classList.add('active');
    document.getElementById('panel-profile').classList.add('active');
}

function renderProfilePanel() {
    const el = document.getElementById('auth-form');
    if (currentUser) {
        el.innerHTML = `<h2>Welcome back</h2><p style="color:var(--dim);margin-bottom:20px;">${currentUser.email}</p>
            <p style="color:var(--dim);font-size:0.85rem;">Courses played: ${userLists.played.length}<br>Want to play: ${userLists.want_to_play.length}<br>Favorites: ${userLists.favorite.length}</p>
            <button class="btn btn-outline" style="margin-top:20px;" onclick="signOut()">Sign Out</button>`;
    } else {
        el.innerHTML = `<h2>Sign In or Sign Up</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <button class="btn" onclick="signIn()">Sign In</button>
            <button class="btn btn-outline" onclick="signUp()">Create Account</button>
            <p id="auth-error" style="color:#e74c3c;margin-top:10px;font-size:0.8rem;"></p>`;
    }
}

async function signIn() {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    const { error } = await db.auth.signInWithPassword({ email, password });
    if (error) document.getElementById('auth-error').textContent = error.message;
}

async function signUp() {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    const { error } = await db.auth.signUp({ email, password });
    if (error) document.getElementById('auth-error').textContent = error.message;
    else document.getElementById('auth-error').textContent = 'Check your email to confirm!';
}

async function signOut() {
    await db.auth.signOut();
    currentUser = null;
    userLists = { played: [], want_to_play: [], favorite: [] };
    userRatings = {};
    updateAuthUI();
    renderLists();
}

async function loadPhotos(courseId) {
    const { data } = await db.from('golf_photos').select('*').eq('course_id', courseId).order('created_at', { ascending: false });
    const gallery = document.getElementById(`photo-gallery-${courseId}`);
    if (!data || data.length === 0) {
        gallery.innerHTML = '<p style="color:var(--dim);font-size:0.75rem;grid-column:1/-1;">No photos yet. Be the first to add one!</p>';
        return;
    }
    gallery.innerHTML = data.map(p => `<img src="${p.photo_url}" alt="${p.caption || ''}" title="${p.caption || ''}" onclick="window.open('${p.photo_url}','_blank')">`).join('');
}

window.uploadPhoto = async function(courseId, input) {
    if (!currentUser || !input.files[0]) return;
    const file = input.files[0];
    const ext = file.name.split('.').pop().toLowerCase();
    const filename = `course-${courseId}-${Date.now()}.${ext}`;
    const caption = document.getElementById(`photo-caption-${courseId}`)?.value || '';

    // Upload to storage
    const { error: uploadError } = await db.storage.from('golf-photos').upload(filename, file, { contentType: file.type, upsert: false });
    if (uploadError) { alert('Upload failed: ' + uploadError.message); return; }

    // Get public URL
    const photoUrl = `${SUPABASE_URL}/storage/v1/object/public/golf-photos/${filename}`;

    // Save to database
    await db.from('golf_photos').insert({ course_id: courseId, user_id: currentUser.id, photo_url: photoUrl, caption: caption || null });

    // Refresh gallery
    input.value = '';
    if (document.getElementById(`photo-caption-${courseId}`)) document.getElementById(`photo-caption-${courseId}`).value = '';
    loadPhotos(courseId);
};

init();
</script>
</body>
</html>
